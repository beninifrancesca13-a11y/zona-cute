<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Zona Cute">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="apple-touch-icon" href="https://i.postimg.cc/43Pd0ngQ/29A5A5FF-AACC-4DDB-B139-9EC151D98505.png">
<link rel="icon" type="image/png" href="https://i.postimg.cc/43Pd0ngQ/29A5A5FF-AACC-4DDB-B139-9EC151D98505.png">

<title>Zona Cute</title>

<style>
body{
margin:0;
padding:18px;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:linear-gradient(180deg,#ffeef6,#fff8fb);
color:#8a4f68;
}
h1{
text-align:center;
color:#d86f9d;
font-size:30px;
}
.card{
background:white;
border-radius:24px;
padding:18px;
margin:14px 0;
box-shadow:0 8px 20px rgba(216,111,157,.18);
}
label{
font-weight:bold;
}
input, select, button{
width:100%;
padding:14px;
margin-top:8px;
margin-bottom:14px;
border-radius:16px;
border:1px solid #ffd6e6;
font-size:17px;
}
button{
background:#f59ac2;
color:white;
font-weight:bold;
border:none;
}
.result{
background:#fff0f7;
padding:15px;
border-radius:18px;
font-size:18px;
text-align:center;
}
.small{
text-align:center;
font-size:14px;
color:#b06b87;
}
</style>
</head>

<body>

<h1>Zona Cute 💕</h1>
<p class="small">Calcolatore semplice per dieta Zona</p>

<div class="card">
<label>Quanti blocchi vuoi fare?</label>
<select id="blocchi">
<option value="1">1 blocco</option>
<option value="2">2 blocchi</option>
<option value="3">3 blocchi</option>
<option value="4">4 blocchi</option>
<option value="5">5 blocchi</option>
</select>

<button onclick="calcola()">Calcola quantità base</button>

<div class="result" id="risultato">
Scegli i blocchi e premi calcola 💗
</div>
</div>

<div class="card">
<h3>Promemoria blocco Zona</h3>
<p>1 blocco = circa:</p>
<p>🥩 7 g proteine</p>
<p>🍎 9 g carboidrati</p>
<p>🥑 3 g grassi</p>
</div>

<div class="card">
<h3>Esempio rapido</h3>
<p><b>3 blocchi</b> = 21 g proteine, 27 g carboidrati, 9 g grassi.</p>
</div>

<script>
function calcola(){
let b = Number(document.getElementById("blocchi").value);
let proteine = b * 7;
let carbo = b * 9;
let grassi = b * 3;

document.getElementById("risultato").innerHTML =
"<b>" + b + " blocchi</b><br><br>" +
"🥩 Proteine: " + proteine + " g<br>" +
"🍎 Carboidrati: " + carbo + " g<br>" +
"🥑 Grassi: " + grassi + " g";
}
</script>

</body>
</html>
